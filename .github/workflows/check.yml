name: dog-check

on:
  schedule:
    # Every 20 minutes. GitHub's scheduler is best-effort and often runs a few
    # minutes late, especially on free runners - that's normal.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab

# Never let two runs overlap (they'd fight over seen.json).
concurrency:
  group: dog-check
  cancel-in-progress: false

permissions:
  contents: write         # needed to commit the updated seen.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Check for new dogs
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}   # optional; defaults to ntfy.sh
        run: python main.py

      - name: Save seen state
        run: |
          git config user.name "dog-check-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "Update seen dogs [skip ci]"
            # Rebase on top of anything that landed while we ran, then push.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
